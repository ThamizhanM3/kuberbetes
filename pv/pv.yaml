apiVersion: v1
kind: PersistentVolume
metadata:
  name: volume1
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""   # keep empty for a static PV (no StorageClass)
  awsElasticBlockStore:
    volumeID: vol-0123456789abcdef0
    fsType: ext4
