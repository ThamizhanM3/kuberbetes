apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ksm-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "nodes"]
  verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ksm-bind
subjects:
- kind: ServiceAccount
  name: ksm
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: ksm-role
  apiGroup: rbac.authorization.k8s.io
