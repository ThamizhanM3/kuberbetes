apiVersion: v1
kind: ServiceAccount
metadata:
  name: ksm
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ksm
  template:
    metadata:
      labels:
        app: ksm
    spec:
      serviceAccountName: ksm
      containers:
      - name: kube-state-metrics
        image: k8s.gcr.io/kube-state-metrics/kube-state-metrics
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ksm-service
  namespace: monitoring
spec:
  selector:
    app: ksm
  ports:
  - port: 8080
    targetPort: 8080
